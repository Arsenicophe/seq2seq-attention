data:
  n_train: 50_000
  min_freq: 2
  max_len: 50
  batch_size: 64

# clés = paramètres exacts de Encoder.__init__ (sauf vocab_size, fourni par le vocab)
encoder:
  embed_dim: 256
  hidden_dim: 512
  n_layers: 2
  dropout: 0.3

# clés = paramètres exacts de Decoder.__init__ (sauf vocab_size)
decoder:
  embed_dim: 256
  hidden_dim: 512
  n_layers: 2
  n_heads: 8
  dropout: 0.3

# clés = paramètres exacts de torch.optim.Adam (sauf params)
optimizer:
  lr: 1.0e-3

# clés = paramètres exacts de Seq2SeqLoss.__init__
loss:
  label_smoothing: 0.1

training:
  n_epochs: 10
  clip: 1.0
  checkpoint_dir: ../checkpoints
  checkpoint_every: 1
